name: GorillaDesk
kind: company
description: GorillaDesk is field service management software for pest control, lawn
  care, pool service, and other home-service businesses, covering scheduling,
  routing, invoicing, payments, customer records, and technician management.
  GorillaDesk exposes a real, self-serve public REST API - the GorillaDesk v1 API
  at https://api.gorilladesk.com/v1 - documented with a public OpenAPI 3.0.3
  specification (rendered via Redoc at https://api.gorilladesk.com/). Access uses
  per-company API keys (Bearer token authentication) generated on the in-app Addons
  page; there is no separate developer signup or API pricing tier - any paying
  account can mint a key. The documented public surface is intentionally narrow
  (Company, Users, Customers, Customer Notes, and Phone Types); broader automation
  (invoices, jobs, work orders, payments) is offered through Zapier connectors and
  out-of-the-box integrations (QuickBooks, Square, Stripe, Google) rather than
  through the public v1 REST spec. A newer, auth-gated v2 API surface
  (apiv2.gdesk.io) exists but is not publicly documented.
