description: >-
  FinOps view of GorillaDesk spend. GorillaDesk is a per-route SaaS subscription
  (a route is a technician's schedule), not a per-user or per-API-call product.
  The dominant cost driver is the number of routes multiplied by the plan tier
  (Basic/Pro/Growth); unlimited office users and mobile devices are included.
  API access carries no separate charge - it is included with any paid plan and
  metered only by rate limits, not by billing. Secondary variable costs are SMS
  usage (local number plus bulk packages) and any transaction fees passed through
  by connected payment processors (Square, Stripe). There is no usage-based API
  billing to optimize.
notes: >-
  Per-route rates are third-party summaries and not reconciled; verify current
  plan pricing and SMS rates on GorillaDesk's site. Payment-processing fees are
  billed by the processor (Square/Stripe), not by GorillaDesk.
