meters:
- name: route_subscription
  description: Number of active routes (technician schedules) billed per month at the plan tier rate.
  unit: routes
  aggregation: sum
  dimensions:
  - account
  - plan
- name: sms_usage
  description: SMS local number and bulk SMS packages consumed for customer texting.
  unit: messages
  aggregation: sum
  dimensions:
  - account
- name: payment_processing
  description: Transaction fees on payments taken through connected processors (Square, Stripe); billed by the processor, not GorillaDesk.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - processor
principles:
- name: Visibility
  description: Track active route count and plan tier as the primary cost line; monitor SMS and payment-processing fees separately.
- name: Allocation
  description: Map routes to technicians / territories so subscription cost aligns with revenue-producing crews.
- name: Optimization
  description: Right-size the number of routes to actual crews, pick the plan tier that matches needed features, and consolidate SMS usage; API access adds no marginal cost.
- name: Accountability
  description: Assign an owner to review monthly route count and add-on charges against field-service revenue.
